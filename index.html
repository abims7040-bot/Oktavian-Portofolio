<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Digital Marketing</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            display: block; /* hapus flex yang lama */
        }

        img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            display: block;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>
    <img src="Digital marketing.jpg" alt="Portofolio Digital Marketing">
</body>
</html>
